# API calls run in the browser → use host-mapped backend (docker-run.sh exposes 8080).
# VITE_API_URL is forced below so Railway/cloud values in .env do not apply inside this container.
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rloco-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      # Always talk to local Docker backend (same machine). Overrides VITE_API_URL from .env.
      VITE_API_URL: http://localhost:8080/api
    networks:
      - rloco-network
    restart: unless-stopped

networks:
  rloco-network:
    driver: bridge
